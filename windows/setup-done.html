<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1511;
    color: #f5f0e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #ffb700;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header .k { font-size: 28px; font-weight: 900; color: #e4002b; }
  .header .name { font-size: 20px; font-weight: 700; color: #1a1511; }
  .rainbow { display: flex; height: 4px; }
  .rainbow div { flex: 1; }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
  }
  .check { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 22px; margin-bottom: 8px; }
  p { color: rgba(245,240,232,0.6); font-size: 14px; }
  .btn {
    background: #ffb700;
    color: #1a1511;
    border: none;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="header">
    <span class="k">K</span>
    <span class="name">Charmera</span>
  </div>
  <div class="rainbow">
    <div style="background:#e4002b"></div>
    <div style="background:#e85d00"></div>
    <div style="background:#f5a623"></div>
    <div style="background:#ffb700"></div>
    <div style="background:#7ab648"></div>
    <div style="background:#00a3e0"></div>
  </div>
  <div class="content">
    <div class="check">&#10003;</div>
    <h2>You're all set!</h2>
    <p>Connect your Kodak Charmera and click Import from the system tray.</p>
    <button class="btn" onclick="window.close()">Done</button>
  </div>
</body>
</html>
